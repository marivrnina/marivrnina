<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1C33"/>
      <stop offset="100%" stop-color="#16264A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B8DEF"/>
      <stop offset="100%" stop-color="#E9739A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- node network pattern, right side -->
  <g opacity="0.55" stroke="#3A5A8C" stroke-width="1.2">
    <line x1="820" y1="60" x2="900" y2="40"/>
    <line x1="900" y1="40" x2="980" y2="70"/>
    <line x1="900" y1="40" x2="960" y2="130"/>
    <line x1="980" y1="70" x2="1060" y2="55"/>
    <line x1="980" y1="70" x2="1030" y2="140"/>
    <line x1="960" y1="130" x2="1030" y2="140"/>
    <line x1="1030" y1="140" x2="1100" y2="110"/>
    <line x1="1100" y1="110" x2="1150" y2="60"/>
    <line x1="1060" y1="55" x2="1150" y2="60"/>
    <line x1="960" y1="130" x2="900" y2="190"/>
    <line x1="1030" y1="140" x2="1080" y2="200"/>
    <line x1="900" y1="190" x2="1080" y2="200"/>
    <line x1="900" y1="190" x2="850" y2="230"/>
    <line x1="1080" y1="200" x2="1130" y2="230"/>
  </g>
  <g fill="#5B8DEF">
    <circle cx="820" cy="60" r="4"/>
    <circle cx="900" cy="40" r="5"/>
    <circle cx="980" cy="70" r="4"/>
    <circle cx="1060" cy="55" r="4"/>
    <circle cx="1150" cy="60" r="5"/>
    <circle cx="960" cy="130" r="4"/>
    <circle cx="1030" cy="140" r="5"/>
    <circle cx="1100" cy="110" r="4"/>
  </g>
  <g fill="#E9739A">
    <circle cx="900" cy="190" r="5"/>
    <circle cx="1080" cy="200" r="4"/>
    <circle cx="850" cy="230" r="4"/>
    <circle cx="1130" cy="230" r="4"/>
  </g>

  <!-- accent bar -->
  <rect x="80" y="96" width="64" height="6" rx="3" fill="url(#accent)"/>

  <!-- name -->
  <text x="80" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="52" fill="#F5F7FB" font-weight="700">
    Mariia Voronina
  </text>

  <!-- tagline -->
  <text x="80" y="188" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#9FB2D6" letter-spacing="0.5">
    Data Analyst — Analytics, Machine Learning &amp; Business Intelligence
  </text>

  <!-- sub tagline -->
  <text x="80" y="218" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#6C82AC" letter-spacing="1.5">
    PYTHON · SQL · R · TABLEAU · MACHINE LEARNING · FORECASTING
  </text>
</svg>
